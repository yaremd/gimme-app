<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Screenshot 7 — Siri Shortcuts</title>
<link rel="stylesheet" href="shared/styles.css">
<style>
  .screen-content {
    background: linear-gradient(180deg, #F5F0E8 0%, #EDE6D8 100%);
    display: flex;
    flex-direction: column;
    padding-top: 12px;
  }
  .shortcuts-list {
    padding: 0 var(--grid);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .shortcut-card {
    background: var(--surface);
    border-radius: var(--radius-card);
    padding: 28px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.04);
  }
  .shortcut-icon {
    width: 88px;
    height: 88px;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .shortcut-icon svg {
    width: 40px;
    height: 40px;
  }
  .shortcut-info {
    flex: 1;
  }
  .shortcut-name {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .shortcut-desc {
    font-size: 22px;
    color: var(--text-tertiary);
    font-weight: 500;
    line-height: 1.3;
  }
  .shortcut-arrow {
    color: var(--text-tertiary);
    flex-shrink: 0;
  }
  .section-header {
    padding: 0 var(--grid);
    margin-bottom: 8px;
  }
  .section-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Siri suggestion bubble at top */
  .siri-bubble {
    margin: 8px var(--grid) 24px;
    background: linear-gradient(135deg, rgba(108,99,255,0.08), rgba(108,99,255,0.03));
    border: 1.5px solid rgba(108,99,255,0.15);
    border-radius: 32px;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .siri-orb {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6C63FF, #A78BFA, #FF6B9D, #FF9500);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(108,99,255,0.3);
  }
  .siri-text {
    font-size: 28px;
    font-weight: 600;
    color: var(--text-primary);
    font-style: italic;
  }
</style>
</head>
<body>
<div class="screenshot bg-emerald">

  <div class="caption">"Hey Siri,<br>add a wish"</div>
  <div class="sub-caption">5 Siri Shortcuts built in</div>

  <div class="device">
    <div class="device-frame">
      <div class="device-screen">
        <div class="dynamic-island"></div>
        <div class="status-bar">
          <span class="status-time">9:41</span>
          <div class="status-icons">
            <svg width="32" height="22" viewBox="0 0 32 22"><rect x="0" y="2" width="6" height="18" rx="1.5" fill="#000"/><rect x="9" y="5" width="6" height="15" rx="1.5" fill="#000"/><rect x="18" y="9" width="6" height="11" rx="1.5" fill="#000"/><rect x="27" y="13" width="5" height="7" rx="1.5" fill="#000" opacity="0.3"/></svg>
            <svg width="30" height="22" viewBox="0 0 30 22"><path d="M15 5C20 5 24 8 27 12C24 16 20 19 15 19C10 19 6 16 3 12C6 8 10 5 15 5Z" stroke="#000" stroke-width="2" fill="none"/></svg>
            <svg width="48" height="22" viewBox="0 0 48 22"><rect x="0" y="2" width="42" height="18" rx="4" stroke="#000" stroke-width="2" fill="none"/><rect x="44" y="7" width="4" height="8" rx="1.5" fill="#000" opacity="0.4"/><rect x="3" y="5" width="34" height="12" rx="2" fill="#000"/></svg>
          </div>
        </div>

        <div class="screen-content">
          <div class="nav-bar">
            <div class="nav-title">Shortcuts</div>
          </div>

          <!-- Siri suggestion -->
          <div class="siri-bubble">
            <div class="siri-orb">
              <svg width="30" height="30" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
            </div>
            <div class="siri-text">"Add wish in Gimme"</div>
          </div>

          <div class="section-header">
            <div class="section-title">Gimme Shortcuts</div>
          </div>

          <div class="shortcuts-list">
            <!-- Open Wishlist -->
            <div class="shortcut-card">
              <div class="shortcut-icon" style="background: rgba(108,99,255,0.1);">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3"/></svg>
              </div>
              <div class="shortcut-info">
                <div class="shortcut-name">Open Wishlist</div>
                <div class="shortcut-desc">Jump to any list instantly</div>
              </div>
              <div class="shortcut-arrow">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#C0BEB8" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
              </div>
            </div>

            <!-- Add Wish -->
            <div class="shortcut-card">
              <div class="shortcut-icon" style="background: rgba(46,170,95,0.1);">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--emerald)" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </div>
              <div class="shortcut-info">
                <div class="shortcut-name">Add Wish</div>
                <div class="shortcut-desc">Create a new wish with details</div>
              </div>
              <div class="shortcut-arrow">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#C0BEB8" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
              </div>
            </div>

            <!-- Quick Add -->
            <div class="shortcut-card">
              <div class="shortcut-icon" style="background: rgba(255,149,0,0.1);">
                <svg viewBox="0 0 24 24" fill="none" stroke="#FF9500" stroke-width="2.5" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
              </div>
              <div class="shortcut-info">
                <div class="shortcut-name">Quick Add</div>
                <div class="shortcut-desc">Save a wish in seconds</div>
              </div>
              <div class="shortcut-arrow">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#C0BEB8" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
              </div>
            </div>

            <!-- Wishlist Total -->
            <div class="shortcut-card">
              <div class="shortcut-icon" style="background: rgba(59,141,212,0.1);">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--ocean)" stroke-width="2" stroke-linecap="round"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/></svg>
              </div>
              <div class="shortcut-info">
                <div class="shortcut-name">Wishlist Total</div>
                <div class="shortcut-desc">How much is on your list?</div>
              </div>
              <div class="shortcut-arrow">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#C0BEB8" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
              </div>
            </div>

            <!-- View Stats -->
            <div class="shortcut-card">
              <div class="shortcut-icon" style="background: rgba(232,88,109,0.1);">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--rose)" stroke-width="2" stroke-linecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
              </div>
              <div class="shortcut-info">
                <div class="shortcut-name">View Stats</div>
                <div class="shortcut-desc">See spending insights</div>
              </div>
              <div class="shortcut-arrow">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#C0BEB8" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
