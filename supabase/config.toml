# Supabase CLI configuration — project: dyporggvmfyzejopaezc
# Docs: https://supabase.com/docs/reference/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://gimmelist.com"
additional_redirect_urls = ["gimme://", "https://gimmelist.com"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[analytics]
enabled = false

[functions.send-reservation-notification]
# Called by a pg_net DB trigger — not by an authenticated client.
# The function handles its own auth check (verifies Authorization header exists).
verify_jwt = false

[functions.delete-account]
# JWT validation done inside the function via supabase.auth.getUser().
verify_jwt = false
