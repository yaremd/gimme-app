name: Whish

schemes:
  Gimme:
    build:
      targets:
        Whish: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WhishTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

options:
  bundleIdPrefix: com.yaremchuk
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    DEAD_CODE_STRIPPING: YES

configs:
  Debug: debug
  Release: release

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Whish:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: Whish
        excludes:
          - "**/.DS_Store"

    info:
      path: Whish/Info.plist
      properties:
        CFBundleDisplayName: Gimme
        CFBundleName: Gimme
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: true
        NSPhotoLibraryUsageDescription: "Gimme needs photo access to add images to wishlist items."
        NSCameraUsageDescription: "Gimme uses the camera so you can photograph items for your wishlist."
        LSApplicationQueriesSchemes:
          - https
          - http
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - gimme
            CFBundleURLName: com.yaremchuk.app
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification

    entitlements:
      path: Whish/Gimme.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.com.yaremchuk.app
        aps-environment: production
        # TODO: Uncomment once paid Apple Developer account is approved
        # com.apple.developer.associated-domains:
        #   - applinks:gimmelist.com

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yaremchuk.app
        INFOPLIST_FILE: Whish/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          ENABLE_TESTABILITY: YES
        Release:
          ENABLE_TESTABILITY: NO
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: wholemodule
          GCC_OPTIMIZATION_LEVEL: s
          LLVM_LTO: YES_THIN
          DEPLOYMENT_POSTPROCESSING: YES
          STRIP_INSTALLED_PRODUCT: YES
          STRIP_STYLE: all

    dependencies:
      - package: Supabase
        product: Supabase
      - target: GimmeShare
      - target: GimmeWidget

  GimmeShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: GimmeShare
        excludes:
          - "**/.DS_Store"

    info:
      path: GimmeShare/Info.plist
      properties:
        CFBundleDisplayName: Save to Gimme
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1

    entitlements:
      path: GimmeShare/GimmeShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.yaremchuk.app

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yaremchuk.app.share
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
      configs:
        Debug:
          ENABLE_TESTABILITY: YES
        Release:
          ENABLE_TESTABILITY: NO
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: wholemodule
          GCC_OPTIMIZATION_LEVEL: s
          LLVM_LTO: YES_THIN
          DEPLOYMENT_POSTPROCESSING: YES
          STRIP_INSTALLED_PRODUCT: YES
          STRIP_STYLE: all

  GimmeWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: GimmeWidget
        excludes:
          - "**/.DS_Store"

    info:
      path: GimmeWidget/Info.plist
      properties:
        CFBundleDisplayName: Gimme Widget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

    entitlements:
      path: GimmeWidget/GimmeWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.yaremchuk.app

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yaremchuk.app.widgets
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: true
      configs:
        Debug:
          ENABLE_TESTABILITY: YES
        Release:
          ENABLE_TESTABILITY: NO
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: wholemodule
          GCC_OPTIMIZATION_LEVEL: s
          LLVM_LTO: YES_THIN
          DEPLOYMENT_POSTPROCESSING: YES
          STRIP_INSTALLED_PRODUCT: YES
          STRIP_STYLE: all

  WhishTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - WhishTests
    dependencies:
      - target: Whish
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yaremchuk.tests
